name: macOS full Table 4 test

on: [push]

jobs:
  test-macos:
    runs-on: macos-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.1"

      - name: Install R packages
        run: |
          Rscript -e "install.packages(c('dplyr', 'data.table', 'readr', 'tidyr', 'twingp'), repos='https://cloud.r-project.org')"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install libomp (required by lightgbm on macOS)
        run: brew install libomp

      - name: Install Python packages
        run: pip install numpy pandas torch torchbnn tensorflow lightgbm scikit-learn jupyter nbconvert
        
      - name: Run Table 4 (full)
        run: python3 run_table4.py

      - name: Show results
        run: |
          ls results/intermediate/
          cat "results/final results.csv"
